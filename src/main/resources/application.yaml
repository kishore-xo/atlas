spring:
  application:
    name: atlas

  datasource:
    url: ${DB_URL}
    username: ${DB_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none

  flyway:
    enabled: true
    baseline-on-migrate: true

  cache:
    type: redis
    cache-names:
      - comment
      - user
      - workspace
      - member
      - task
  data:
    redis:
      host: localhost
      port: 6379

  devtools:
    restart:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    db:
      enabled: true

logging:
  level:
    root: info
    org.springframework.web: info
    org.hibernate.jpa: warn